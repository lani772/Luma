openapi: 3.0.3
info:
  title: LUMA Cloud Backend API
  description: >
    Cloud backend for LUMA Smart Home — Phase 1 (Auth, User, Device
    Registration, MQTT Broker Adapter engines). All routes are mounted
    under the /cloud prefix. Spec-literal engine-namespaced paths
    (/cloud/api/engines/<engine>/...) are available as aliases alongside
    the primary REST paths shown below.
  version: 0.1.0
servers:
  - url: /cloud
tags:
  - name: Auth
  - name: Users
  - name: Devices
  - name: MQTT
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      tags: [Auth]
      summary: Liveness/readiness check
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account and start the first session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                fullName: { type: string }
                deviceName: { type: string }
                platform: { type: string, enum: [ios, android, web] }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponseEnvelope"
        "409":
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and start a new phone-scoped session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                deviceName: { type: string }
                platform: { type: string, enum: [ios, android, web] }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponseEnvelope"
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate a refresh token for a new access/refresh pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponseEnvelope"
        "401":
          description: Refresh token invalid, expired, or already rotated

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session's refresh token and blacklist its access token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken: { type: string }
      responses:
        "204": { description: Logged out }

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions (phones) for the current account
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"

  /auth/sessions/revoke-others:
    post:
      tags: [Auth]
      summary: Revoke every session except the current one
      responses:
        "204": { description: Other sessions revoked }

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get the current account's auth profile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"

  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Request a password reset token (delivery is stubbed in Phase 1)
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "202": { description: Reset requested (always 202, regardless of whether the email exists) }

  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirm a password reset with the issued token
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses:
        "204": { description: Password updated }

  /auth/email-verification/request:
    post:
      tags: [Auth]
      summary: Request an email verification token (delivery is stubbed in Phase 1)
      responses:
        "202": { description: Verification requested }

  /auth/email-verification/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification with the issued token
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "204": { description: Email verified }

  /users/me:
    get:
      tags: [Users]
      summary: Get the current account
      responses:
        "200": { description: Account, content: { application/json: { schema: { $ref: "#/components/schemas/ApiEnvelope" } } } }
    patch:
      tags: [Users]
      summary: Update profile fields
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: { type: string }
      responses:
        "200": { description: Updated }

  /users/me/preferences:
    patch:
      tags: [Users]
      summary: Update notification/unit/theme preferences
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200": { description: Updated }

  /users/me/phones:
    get:
      tags: [Users]
      summary: List phones (session-bearing devices) linked to this account
      responses:
        "200": { description: Phone list }

  /users/me/phones/{phoneId}:
    delete:
      tags: [Users]
      summary: Remove a linked phone and revoke its sessions
      parameters:
        - name: phoneId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Removed }

  /users/me/devices:
    get:
      tags: [Users]
      summary: List devices this account owns or administers
      responses:
        "200": { description: Device summaries }

  /devices:
    post:
      tags: [Devices]
      summary: Register a new device, owned by the current account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, deviceType, microcontrollerId, macAddress]
              properties:
                name: { type: string }
                deviceType: { type: string }
                microcontrollerId: { type: string }
                macAddress: { type: string }
                capabilities:
                  type: array
                  items: { type: string }
      responses:
        "201": { description: Device registered }
    get:
      tags: [Devices]
      summary: List devices owned or administered by the current account
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: perPage
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200": { description: Paginated device list }

  /devices/{deviceId}:
    parameters:
      - name: deviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Devices]
      summary: Get a device (owner or admin access required)
      responses:
        "200": { description: Device }
        "403": { description: Not owner or admin of this device }
    patch:
      tags: [Devices]
      summary: Update a device's name/capabilities
      responses:
        "200": { description: Updated }
    delete:
      tags: [Devices]
      summary: Remove a device (owner only)
      responses:
        "204": { description: Removed }

  /devices/{deviceId}/transfer-ownership:
    post:
      tags: [Devices]
      summary: Transfer ownership to another account by email (owner only; old owner becomes admin)
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [newOwnerEmail]
              properties:
                newOwnerEmail: { type: string, format: email }
      responses:
        "200": { description: Ownership transferred }

  /devices/{deviceId}/admins:
    post:
      tags: [Devices]
      summary: Grant admin access to another account by email (owner only)
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Admin granted }

  /devices/{deviceId}/admins/{userId}:
    delete:
      tags: [Devices]
      summary: Revoke a device admin (owner only)
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Admin revoked }

  /devices/{deviceId}/history:
    get:
      tags: [Devices]
      summary: Ownership/admin history for a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: History entries }

  /devices/{deviceId}/mqtt-credentials:
    post:
      tags: [MQTT]
      summary: Issue (or rotate) scoped MQTT credentials for a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Credentials issued }
    delete:
      tags: [MQTT]
      summary: Revoke a device's MQTT credentials
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Revoked }

  /devices/{deviceId}/mqtt-topics:
    get:
      tags: [MQTT]
      summary: Get the MQTT topic set for a device
      parameters:
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Topics }

  /engines/mqtt/health:
    get:
      tags: [MQTT]
      summary: Broker adapter connection health
      security: []
      responses:
        "200": { description: Health status }

  /firmware/upload:
    post:
      tags: [Firmware]
      summary: Upload a new firmware binary
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, deviceType, version, channel]
              properties:
                file: { type: string, format: binary }
                deviceType: { type: string }
                version: { type: string }
                channel: { type: string, enum: [stable, beta] }
                releaseNotes: { type: string }
                signature: { type: string }
                isRollbackTarget: { type: boolean }
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmwareRelease"

  /firmware:
    get:
      tags: [Firmware]
      summary: List all firmware releases
      parameters:
        - name: deviceType
          in: query
          schema: { type: string }
        - name: channel
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: perPage
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated releases

  /firmware/compare:
    get:
      tags: [Firmware]
      summary: Compare device firmware with latest release
      parameters:
        - name: deviceType
          in: query
          required: true
          schema: { type: string }
        - name: currentVersion
          in: query
          required: true
          schema: { type: string }
        - name: channel
          in: query
          schema: { type: string, default: stable }
      responses:
        "200":
          description: Comparison results

  /firmware/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Firmware]
      summary: Get a specific firmware release metadata
      responses:
        "200":
          description: Firmware metadata
    delete:
      tags: [Firmware]
      summary: Delete a firmware release and binary
      responses:
        "200": { description: Deleted }

  /firmware/{id}/publish:
    post:
      tags: [Firmware]
      summary: Change a firmware's release channel
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel]
              properties:
                channel: { type: string, enum: [stable, beta] }
      responses:
        "200": { description: Updated }

  /firmware/{id}/archive:
    post:
      tags: [Firmware]
      summary: Toggle rollback-safety/archived status for a firmware
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isRollbackTarget]
              properties:
                isRollbackTarget: { type: boolean }
      responses:
        "200": { description: Updated }

  /firmware/{id}/download:
    get:
      tags: [Firmware]
      summary: Download the raw firmware binary
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: deviceId
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Raw binary stream
          content:
            application/octet-stream: {}

  /deployments:
    post:
      tags: [Deployments]
      summary: Create a firmware deployment campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firmwareId, name, rolloutPercentage]
              properties:
                firmwareId: { type: string, format: uuid }
                name: { type: string }
                rolloutPercentage: { type: integer, minimum: 0, maximum: 100 }
                scheduledAt: { type: string, format: date-time }
      responses:
        "201":
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
    get:
      tags: [Deployments]
      summary: List all firmware deployment campaigns
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: perPage
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated deployments list

  /deployments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Deployments]
      summary: Get details and status of a deployment campaign
      responses:
        "200":
          description: Deployment status and metrics

  /deployments/{id}/rollback:
    post:
      tags: [Deployments]
      summary: Cancel or rollback a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Rolled back }

  /deployments/{id}/devices/{deviceId}/retry:
    post:
      tags: [Deployments]
      summary: Retry deployment on a failed device
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: deviceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Queued for retry }

  /notifications:
    post:
      tags: [Notifications]
      summary: Send/Trigger a notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, type, title, body]
              properties:
                userId: { type: string, format: uuid }
                type: { type: string, enum: [firmware, device, automation, schedule, user, system] }
                title: { type: string }
                body: { type: string }
                data: { type: object }
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
    get:
      tags: [Notifications]
      summary: List notifications for current user
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: perPage
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated notifications list

  /notifications/mark-read:
    post:
      tags: [Notifications]
      summary: Mark a list of notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notificationIds]
              properties:
                notificationIds:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "200": { description: Marked read }

  /sync/push:
    post:
      tags: [Sync]
      summary: Push client-side resource modifications to the server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneId, resources]
              properties:
                phoneId: { type: string, format: uuid }
                resources:
                  type: array
                  items:
                    $ref: "#/components/schemas/SyncResource"
      responses:
        "200":
          description: Sync result including resolved conflicts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  conflicts:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncResource"

  /sync/pull:
    post:
      tags: [Sync]
      summary: Pull server-side resource modifications since client last version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneId, resourceType]
              properties:
                phoneId: { type: string, format: uuid }
                resourceType: { type: string }
                lastVersion: { type: integer }
      responses:
        "200":
          description: Pulled resources and current version
          content:
            application/json:
              schema:
                type: object
                properties:
                  resources:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncResource"
                  currentVersion: { type: integer }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SyncResource:
      type: object
      properties:
        resourceId: { type: string }
        resourceType: { type: string }
        data: { type: object }
        version: { type: integer }
        updatedAt: { type: string, format: date-time }
        deleted: { type: boolean }
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        data: { type: object }
        readAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    Deployment:
      type: object
      properties:
        id: { type: string, format: uuid }
        firmwareId: { type: string, format: uuid }
        name: { type: string }
        status: { type: string }
        rolloutPercentage: { type: integer }
        scheduledAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    FirmwareRelease:
      type: object
      properties:
        id: { type: string, format: uuid }
        deviceType: { type: string }
        version: { type: string }
        channel: { type: string }
        storagePath: { type: string }
        checksumSha256: { type: string }
        signature: { type: string }
        sizeBytes: { type: integer }
        releaseNotes: { type: string }
        isRollbackTarget: { type: boolean }
        createdBy: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
    ApiEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data: {}
    AuthResponseEnvelope:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            accessToken: { type: string }
            accessTokenExpiresAt: { type: string, format: date-time }
            refreshToken: { type: string }
            refreshTokenExpiresAt: { type: string, format: date-time }
            sessionId: { type: string, format: uuid }
            user:
              type: object
              properties:
                id: { type: string, format: uuid }
                email: { type: string, format: email }
                fullName: { type: string }
                role: { type: string }
                emailVerified: { type: boolean }
                subscriptionTier: { type: string }
                createdAt: { type: string, format: date-time }
