kind = "mobile"
previewPath = "/"
title = "LUMA Smart Home"
version = "1.0.0"
id = "artifacts/luma-smart-home"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20792

[services.development]
run = "pnpm --filter @workspace/luma-smart-home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luma-smart-home", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/luma-smart-home", "run", "serve" ]

[services.env]
PORT = "20792"
BASE_PATH = "/"
