*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#060912;-webkit-font-smoothing:antialiased;font-family:'Rajdhani',system-ui,sans-serif}
#root{min-height:100vh}
button{font-family:'Rajdhani',system-ui,sans-serif;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:'Rajdhani',system-ui,sans-serif}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:99px;outline:none;cursor:pointer;width:100%;display:block}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#2563EB;cursor:pointer}
select{background:#1A2236;border:1px solid rgba(30,58,95,0.28);border-radius:10px;color:#F0E2C4;padding:10px 14px;width:100%;outline:none;font-size:13px;font-family:'Rajdhani',system-ui,sans-serif}
textarea{background:#1A2236;border:1px solid rgba(30,58,95,0.28);border-radius:10px;color:#F0E2C4;padding:10px 14px;width:100%;outline:none;resize:none;font-family:'Rajdhani',system-ui,sans-serif}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes glowP{0%,100%{box-shadow:0 0 12px #22c55e44}50%{box-shadow:0 0 28px #22c55e99}}
@keyframes slideU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cmdP{0%,100%{box-shadow:0 0 14px #2563EB55}50%{box-shadow:0 0 32px #2563EBB0}}
@keyframes connP{0%,100%{box-shadow:0 0 10px #FBBF2440}50%{box-shadow:0 0 24px #FBBF24A0}}
.pg{animation:fadeUp .28s cubic-bezier(.4,0,.2,1) both}
.su{animation:slideU .22s cubic-bezier(.4,0,.2,1) both}
.tap{transition:transform .11s,opacity .11s;user-select:none}
.tap:active{transform:scale(.95);opacity:.8}
.blink{animation:blink 1.8s ease-in-out infinite}
.glow{animation:glowP 2.8s ease-in-out infinite}
.spin{animation:spin .7s linear infinite}
.cmdp{animation:cmdP 1s ease-in-out infinite}
.connp{animation:connP 1.2s ease-in-out infinite}
</style>

// ─── LIGHTWEIGHT CHARTS (replace recharts) ───────────────────────
function MiniAreaChart({ data, height, color }) {
  const h = height || 90, w = 320, pad = 6
  const vals = data.map(d => d.v)
  const max = Math.max(...vals, 1), min = Math.min(...vals, 0)
  const range = max - min || 1
  const stepX = (w - pad*2) / (data.length - 1 || 1)
  const pts = data.map((d,i) => {
    const x = pad + i*stepX
    const y = pad + (h-pad*2) * (1 - (d.v - min)/range)
    return [x,y]
  })
  const linePath = pts.map((p,i) => (i===0?"M":"L") + p[0] + "," + p[1]).join(" ")
  const areaPath = linePath + ` L${pts[pts.length-1][0]},${h-pad} L${pts[0][0]},${h-pad} Z`
  const id = "ag" + Math.random().toString(36).slice(2,8)
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      <defs>
        <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${id})`} />
      <path d={linePath} fill="none" stroke={color} strokeWidth="2" />
      {pts.map((p,i) => <circle key={i} cx={p[0]} cy={p[1]} r="2.2" fill={color} />)}
      {data.map((d,i) => (
        <text key={i} x={pad+i*stepX} y={h-1} fontSize="7" fill={D.mute} textAnchor="middle" fontFamily={D.fb}>{d.label}</text>
      ))}
    </svg>
  )
}
function MiniBarChart({ data, height, color }) {
  const h = height || 150, w = 320, pad = 8, bottomPad = 16
  const vals = data.map(d => d.v)
  const max = Math.max(...vals, 1)
  const bw = (w - pad*2) / data.length
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      {data.map((d,i) => {
        const bh = ((h - bottomPad - pad) * d.v) / max
        const x = pad + i*bw + bw*0.18
        const y = h - bottomPad - bh
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw*0.64} height={bh} rx="3" fill={color} opacity={0.9} />
            <text x={x+bw*0.32} y={h-3} fontSize="7" fill={D.mute} textAnchor="middle" fontFamily={D.fb}>{d.label}</text>
          </g>
        )
      })}
    </svg>
  )
}

// ─── UTILITIES ────────────────────────────────────────────────────
function timeAgo(ts) {
  const d = Date.now() - ts
  if (d < 60000) return Math.floor(d/1000) + "s ago"
  if (d < 3600000) return Math.floor(d/60000) + "m ago"
  if (d < 86400000) return Math.floor(d/3600000) + "h ago"
  return Math.floor(d/86400000) + "d ago"
}
function fmtCD(at) {
  const d = Math.max(0, at - Date.now())
  const h = Math.floor(d/3600000)
  const m = Math.floor((d%3600000)/60000)
  const s = Math.floor((d%60000)/1000)
  if (h > 0) return h + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0")
  return m + ":" + String(s).padStart(2,"0")
}
function hColor(q) { return q >= 80 ? D.on : q >= 55 ? D.warn : D.off }
function rColor(r) { return r >= -60 ? D.on : r >= -70 ? D.warn : D.off }
function roleC(ro) {
  const m = { Admin:D.accent, Manager:D.on, Operator:D.purple, Viewer:D.gold }
  return m[ro] || D.mute
}
function connS(l) {
  if (!l.online) return "offline"
  if (l.mqttStatus === "disconnected") return "connecting"
  return "online"
}

// ─── PREMIUM TOGGLE ───────────────────────────────────────────────
function PToggle({ on, onChange, cs }) {
  const [pending, setPending] = useState(false)
  const cs2 = cs || "online"

  function handle(e) {
    e.stopPropagation()
    if (pending || cs2 === "offline") return
    setPending(true)
    setTimeout(() => { onChange(!on); setPending(false) }, 1400)
  }

  const isOff  = cs2 === "offline"
  const isConn = cs2 === "connecting"

  let bg = D.elevated
  if (pending)   bg = `linear-gradient(135deg,${D.elevated},${D.card2})`
  else if (isOff) bg = D.elevated
  else if (isConn) bg = `linear-gradient(135deg,${D.warn}70,${D.gold}70)`
  else if (on)    bg = `linear-gradient(135deg,#1d4ed8,${D.accent},${D.accentL})`

  let shadow = "none"
  if (pending)   shadow = `0 0 0 2px ${D.accent}40`
  else if (isConn) shadow = `0 0 18px ${D.warn}55`
  else if (on)    shadow = `0 0 22px ${D.accent}80,0 0 50px ${D.accent}28`

  const dotC = isOff ? D.off : isConn ? D.warn : D.on
  const cls = pending ? "cmdp" : isConn ? "connp" : ""

  return (
    <div onClick={handle} className={cls}
      style={{ width:57, height:32, borderRadius:99, flexShrink:0,
        cursor: isOff ? "not-allowed" : "pointer",
        background: bg, position:"relative",
        transition:"background .28s,box-shadow .28s",
        boxShadow: shadow, opacity: isOff ? .55 : 1 }}>
      <div style={{ position:"absolute", top:-3, right:-3, width:11, height:11,
        borderRadius:"50%", border:`2px solid ${D.bg}`,
        background: dotC, zIndex:2, boxShadow:`0 0 6px ${dotC}80` }} />
      {pending ? (
        <div className="spin" style={{ position:"absolute", top:"50%", left:"50%",
          transform:"translate(-50%,-50%)", width:20, height:20, borderRadius:"50%",
          border:`2.5px solid rgba(255,255,255,.2)`,
          borderTop:`2.5px solid rgba(255,255,255,.9)` }} />
      ) : (
        <div style={{ width:24, height:24, background:"#fff", borderRadius:"50%",
          position:"absolute", top:4, left: on ? 29 : 4,
          transition:"left .28s cubic-bezier(.34,1.2,.64,1)",
          boxShadow:"0 2px 8px rgba(0,0,0,.55)" }} />
      )}
    </div>
  )
}

function LMTimers({ lamp, upd }) {
  const [cH, setCH] = useState(0)
  const [cM, setCM] = useState(30)
  const [act, setAct] = useState("off")
  const [cd, setCd] = useState(lamp.activeTimer ? fmtCD(lamp.activeTimer.expiresAt) : "")

  useEffect(() => {
    if (!lamp.activeTimer) { setCd(""); return }
    setCd(fmtCD(lamp.activeTimer.expiresAt))
    const t = setInterval(() => setCd(fmtCD(lamp.activeTimer.expiresAt)), 1000)
    return () => clearInterval(t)
  }, [lamp.activeTimer])

  function setTimer(ms) {
    if (ms <= 0) return
    upd({ activeTimer:{action:act,expiresAt:Date.now()+ms,label:`${Math.round(ms/60000)}m → ${act.toUpperCase()}`},
      lastCommand:"Timer set", lastUpdate:Date.now() })
  }
  function clearTimer() {
    upd({ activeTimer:null, lastCommand:"Timer cleared", lastUpdate:Date.now() })
  }

  return (
    <div>
      <Sl>Timer Dashboard</Sl>
      {lamp.activeTimer ? (
        <div style={{ background:`${D.warn}0E`, border:`1px solid ${D.warn}35`,
          borderRadius:16, padding:"18px", marginBottom:18 }}>

            on expiry

function LMSchedule({ lamp, upd }) {
  const [adding, setAdding] = useState(false)
  const [form, setForm] = useState({name:"",type:"daily",action:"on",time:"07:00",days:[],enabled:true})
  const TYPES = ["one-time","daily","weekly","monthly","sunrise","sunset"]
  const DAYS  = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
  const TI = {"one-time":"📅","daily":"🔄","weekly":"📆","monthly":"🗓","sunrise":"🌅","sunset":"🌇"}

  function fSet(k,v) { setForm(p => ({...p,[k]:v})) }
  function toggleDay(d) {
    const ds = form.days
    fSet("days", ds.includes(d) ? ds.filter(x=>x!==d) : [...ds,d])
  }
  function save() {
    const label = form.name || `${TI[form.type]} ${form.type} — ${form.action}`
    upd({ schedules:[...lamp.schedules,{id:`sch${Date.now()}`,label,...form}] })
    setForm({name:"",type:"daily",action:"on",time:"07:00",days:[],enabled:true})
    setAdding(false)
  }
  function del(id) { upd({ schedules:lamp.schedules.filter(s=>s.id!==id) }) }
  function tog(id) {
    upd({ schedules:lamp.schedules.map(s => s.id===id ? {...s,enabled:!(s.enabled!==false)} : s) })
  }

  return (
    <div>
      <Sl>Schedule Management ({lamp.schedules.length} configured)</Sl>
      {lamp.schedules.length===0 && !adding && (
        <div style={{ textAlign:"center", padding:"24px 0", marginBottom:14 }}>
          <Calendar size={30} color={D.mute} style={{ margin:"0 auto 10px" }} />
          <p style={{ color:D.mute, fontSize:13, fontFamily:D.fb }}>No schedules configured</p>
        </div>
      )}
      {lamp.schedules.map(s => (
        <Crd key={s.id} style={{ padding:"14px 16px", marginBottom:10, opacity:s.enabled!==false?1:.6 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:18, flexShrink:0 }}>{TI[s.type]||"⏰"}</span>
            <div style={{ flex:1, minWidth:0 }}>
              <p style={{ fontSize:14, fontWeight:700, color:D.txt, fontFamily:D.fb,
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.label||s.name}</p>
              <p style={{ fontSize:11, color:D.mute, marginTop:2 }}>
                {s.type}{s.time ? ` · ${s.time}` : ""}{s.days?.length ? ` · ${s.days.join(", ")}` : ""}
              </p>
            </div>
            <div style={{ display:"flex", gap:7, alignItems:"center", flexShrink:0 }}>
              <Toggle on={s.enabled!==false} onChange={() => tog(s.id)} />
              <button onClick={() => del(s.id)}
                style={{ width:28, height:28, borderRadius:8, display:"flex",
                  alignItems:"center", justifyContent:"center",
                  background:`${D.off}12`, border:`1px solid ${D.off}25`, color:D.off }}>
                <Trash2 size={12} />
              </button>
            </div>
          </div>
          <div style={{ display:"flex", gap:7, marginTop:9 }}>
            <span style={{ fontSize:10, fontWeight:700,
              color: s.action==="on" ? D.on : D.off,
              background: s.action==="on" ? `${D.on}14` : `${D.off}14`,
              padding:"2px 8px", borderRadius:5 }}>
              {s.action==="on" ? "● ON" : "○ OFF"}
            </span>
          </div>
        </Crd>
      ))}
      {!adding && (
        <button onClick={() => setAdding(true)} className="tap"
          style={{ width:"100%", padding:"12px", borderRadius:13,
            background:`${D.accent}12`, border:`1px solid ${D.accent}35`,
            color:D.accentL, fontSize:13, fontWeight:700, fontFamily:D.fb,
            display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
          <Plus size={14} />Create Schedule
        </button>
      )}
      {adding && (
        <div style={{ background:D.bg, borderRadius:16, padding:"16px",
          border:`1px solid ${D.b2}`, marginTop:10 }} className="su">
          <p style={{ fontSize:15, fontWeight:700, color:D.txt, fontFamily:D.fd, marginBottom:14 }}>New Schedule</p>
          <input value={form.name} onChange={e=>fSet("name",e.target.value)}
            placeholder="Schedule name (optional)" style={inputSt} />
          <Sl>Type</Sl>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:7, marginBottom:14 }}>
            {TYPES.map(t => (
              <button key={t} onClick={() => fSet("type",t)}
                style={{ padding:"9px 4px", borderRadius:10,
                  background: form.type===t ? `${D.accent}18` : "transparent",
                  border:`1px solid ${form.type===t ? D.accent : D.b0}`,
                  color: form.type===t ? D.accentL : D.mute,
                  fontSize:11, fontWeight:700, fontFamily:D.fb,

                style={{ flex:1, padding:"9px", borderRadius:10,

                      border:`1px solid ${form.days.includes(d) ? D.accent : D.b0}`,

            </>
          )}

            <button onClick={save} className="tap"
              style={{ flex:1, padding:"11px", borderRadius:11,

                color:D.on, fontSize:13, fontWeight:700, fontFamily:D.fb }}>Save</button>
            <button onClick={() => setAdding(false)} className="tap"
              style={{ flex:1, padding:"11px", borderRadius:11,
                background:`${D.off}12`, border:`1px solid ${D.off}30`,
                color:D.off, fontSize:13, fontWeight:700, fontFamily:D.fb }}>Cancel</button>
          </div>
        </div>
      )}

  )

          style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 12px",
            borderRadius:9, background:`${D.accentL}12`, border:`1px solid ${D.accentL}30`,
            color:D.accentL, fontSize:12, fontWeight:700, fontFamily:D.fb }}>
          <Edit2 size={11} />{editing ? "View" : "Edit"}
        </button>
      </div>
      {!editing ? (
        <div>
          {fields.map((f, i) => (
            <div key={f.l} style={{ background: i%2===0 ? D.surface : D.elevated,
              borderRadius: i===0 ? "14px 14px 0 0" : i===fields.length-1 ? "0 0 14px 14px" : "0",
              padding:"12px 16px",
              border:`1px solid ${D.b0}`, borderTop: i===0 ? `1px solid ${D.b0}` : "none" }}>
              <p style={{ fontSize:10, color:D.mute, fontWeight:700, letterSpacing:".08em",
                textTransform:"uppercase", marginBottom:4 }}>{f.l}</p>
              <p style={{ fontSize:13, color:D.txt, fontFamily:D.fb }}>{data[f.k]||"—"}</p>
            </div>
          ))}
          <Sl mt={18}>Tags</Sl>
          <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
            {data.tags.length > 0 ? data.tags.map(t => (
              <span key={t} style={{ fontSize:12, fontWeight:700, color:D.accentL,
                background:`${D.accent}14`, padding:"4px 12px", borderRadius:99,
                border:`1px solid ${D.accent}30` }}>{t}</span>
            )) : <span style={{ fontSize:12, color:D.mute }}>No tags</span>}
          </div>
        </div>
      ) : (
        <div className="su">
          {fields.map(f => (
            <div key={f.k}>
              <Sl>{f.l}</Sl>
              {f.k.includes("Notes") || f.k==="description" ? (
                <textarea rows={2} value={data[f.k]}
                  onChange={e=>fSet(f.k,e.target.value)}
                  placeholder={f.l + "…"} style={{ marginBottom:12 }} />
              ) : (
                <input value={data[f.k]} onChange={e=>fSet(f.k,e.target.value)}
                  placeholder={f.l} style={inputSt} />
              )}
            </div>
          ))}
          <Sl>Tags</Sl>
          <div style={{ display:"flex", gap:7, flexWrap:"wrap", marginBottom:10 }}>
            {data.tags.map(t => (
              <span key={t} onClick={() => fSet("tags",data.tags.filter(x=>x!==t))}
                className="tap" style={{ fontSize:12, fontWeight:700, color:D.accentL,
                  background:`${D.accent}14`, padding:"4px 12px", borderRadius:99,
                  border:`1px solid ${D.accent}30`, cursor:"pointer" }}>
                {t} ✕
              </span>
            ))}
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <input value={newTag} onChange={e=>setNewTag(e.target.value)}
              onKeyDown={e => e.key==="Enter" && addTag()}
              placeholder="Add tag…" style={{...inputSt,flex:1,marginBottom:0}} />
            <button onClick={addTag} className="tap"
              style={{ padding:"0 16px", borderRadius:11,
                background:`${D.accent}14`, border:`1px solid ${D.accent}30`,
                color:D.accentL, fontSize:13, fontWeight:700, fontFamily:D.fb }}>Add</button>
          </div>
          <button onClick={() => setEditing(false)} className="tap"
            style={{ width:"100%", marginTop:14, padding:"12px", borderRadius:12,
              background:`${D.on}14`, border:`1px solid ${D.on}35`,
              color:D.on, fontSize:13, fontWeight:700, fontFamily:D.fb }}>
            Save Changes
          </button>
        </div>
      )}
    </div>
  )
}

function LMSpecs({ lamp }) {

    return (
      <div style={{ marginBottom:20 }}>
        <Sl>{title}</Sl>
        <Crd style={{ padding:0, overflow:"hidden" }}>
          {rows.map(([k,v], i) => (
            <div key={k} style={{ display:"flex", justifyContent:"space-between",
              alignItems:"center", padding:"11px 16px",
              background: i%2===0 ? D.surface : D.elevated,
              borderBottom: i<rows.length-1 ? `1px solid ${D.b0}` : "none" }}>
              <span style={{ fontSize:12, color:D.sec, fontFamily:D.fb, fontWeight:600 }}>{k}</span>
              <span style={{ fontSize:11, color:D.mute, fontFamily:D.fm,
                maxWidth:"55%", textAlign:"right", wordBreak:"break-all" }}>{v}</span>
            </div>
          ))}
        </Crd>
      </div>
    )
  }

  return (
    <div>
      <SecTable title="Device Information" rows={[
        ["Model","LUMA Pro X9"],["Manufacturer","LUMA Systems"],
        ["Serial Number",`SN-${lamp.id}-2024`],["Device ID",lamp.deviceId],
        ["Firmware",lamp.firmware],["Hardware","HW-2.1.0"],
        ["IP Address",lamp.health.ip],["MAC Address",lamp.mac],
      ]} />
      <SecTable title="MQTT Topics" rows={[
        ["Publish",`${base}/command`],["Subscribe",`${base}/state`],
        ["Broker","mqtt.luma.local:1883"],["QoS","1 — At least once"],
        ["Retain","true"],["Keep Alive","60 s"],
      ]} />
      <SecTable title="Electrical" rows={[
        ["Rated Voltage","100–240 V AC"],["Operating Voltage",`${lamp.voltage.toFixed(1)} V`],
        ["Current Draw",`${(lamp.current*1000).toFixed(0)} mA`],
        ["Power Consumption",`${lamp.power} W`],["Maximum Load","15 W"],
      ]} />
      <SecTable title="Connectivity" rows={[
        ["WiFi","802.11 b/g/n 2.4 GHz"],["Security","WPA2/WPA3"],
        ["Signal (RSSI)",`${lamp.health.rssi} dBm`],
        ["Signal Quality",`${lamp.health.signalQuality}%`],
        ["Protocol","MQTT v3.1.1"],["Uptime",lamp.health.uptime],
      ]} />
    </div>
  )
}

function LMSettings({ lamp, upd, onBack }) {
  const [s, setS] = useState({
    adminLock:false, pinProtection:false, guestAccess:true,
    localButtonLock:false, remoteControlLock:false,
    autoUpdate:true, enableLogs:false,
  })
  const [renaming, setRenaming] = useState(false)
  const [newName, setNewName] = useState(lamp.name)

  function tog(k) { setS(x => ({...x,[k]:!x[k]})) }

  function SR({ icon, title, sub, k }) {
    return (
      <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 0",
        borderBottom:`1px solid ${D.b0}` }}>
        <span style={{ fontSize:16, flexShrink:0, width:28, textAlign:"center" }}>{icon}</span>
        <div style={{ flex:1 }}>
          <p style={{ fontSize:14, fontWeight:700, color:D.txt, fontFamily:D.fb }}>{title}</p>
          <p style={{ fontSize:11, color:D.mute, marginTop:1 }}>{sub}</p>
        </div>
        <Toggle on={s[k]} onChange={() => tog(k)} />
      </div>
    )
  }

  return (
    <div>
      <Sl>Security</Sl>
      <Crd style={{ padding:"0 16px", marginBottom:18 }}>
        <SR icon="🔒" title="Admin Lock"           sub="Require admin approval for changes" k="adminLock" />
        <SR icon="🔐" title="PIN Protection"        sub="Require PIN for local control"      k="pinProtection" />
        <SR icon="👥" title="Guest Access"          sub="Allow guest users to control"        k="guestAccess" />
        <SR icon="🖲" title="Local Button Lock"     sub="Disable physical button"             k="localButtonLock" />
        <SR icon="📡" title="Remote Control Lock"   sub="Block remote MQTT commands"          k="remoteControlLock" />
      </Crd>

      <Sl>Firmware</Sl>
      <Crd style={{ padding:"14px 16px", marginBottom:18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <div>
            <p style={{ fontSize:13, fontWeight:700, color:D.txt, fontFamily:D.fb }}>Current Version</p>
            <p style={{ fontSize:12, color:D.accentL, fontFamily:D.fm, marginTop:2 }}>{lamp.firmware}</p>
          </div>
          <span style={{ fontSize:11, color:D.on, fontWeight:700 }}>✓ Up to date</span>
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:12 }}>
          <ABtn emoji="🔍" label="Check Updates" color={D.accentL} />
          <ABtn emoji="⬆️" label="Update"         color={D.on} />
          <ABtn emoji="⬇️" label="Rollback"       color={D.warn} />
        </div>
        <div style={{ borderTop:`1px solid ${D.b0}`, paddingTop:12,
          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontSize:13, color:D.sec, fontFamily:D.fb }}>Auto-Update</span>
          <Toggle on={s.autoUpdate} onChange={() => tog("autoUpdate")} />
        </div>
      </Crd>

      <Sl>Device Configuration</Sl>
      <Crd style={{ padding:"14px 16px", marginBottom:18 }}>
        {!renaming ? (
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div>
              <p style={{ fontSize:13, fontWeight:700, color:D.txt, fontFamily:D.fb }}>Device Name</p>
              <p style={{ fontSize:12, color:D.mute, marginTop:2 }}>{lamp.name}</p>
            </div>
            <button onClick={() => setRenaming(true)} className="tap"
              style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 12px",
                borderRadius:9, background:`${D.accentL}12`, border:`1px solid ${D.accentL}30`,
                color:D.accentL, fontSize:12, fontWeight:700, fontFamily:D.fb }}>
              <Edit2 size={11} />Rename
            </button>
          </div>
        ) : (
          <div style={{ marginBottom:12 }} className="su">
            <div style={{ display:"flex", gap:8 }}>
              <input value={newName} onChange={e=>setNewName(e.target.value)}
                style={{...inputSt,marginBottom:0,flex:1}} />
              <button onClick={() => { upd({name:newName,lastUpdate:Date.now()}); setRenaming(false) }}
                className="tap"
                style={{ padding:"0 14px", borderRadius:10, background:`${D.on}14`,
                  border:`1px solid ${D.on}30`, color:D.on, fontSize:13, fontWeight:700, fontFamily:D.fb }}>
                Save
              </button>
              <button onClick={() => setRenaming(false)}
                style={{ padding:"0 10px", borderRadius:10,
                  background:`${D.off}10`, border:`1px solid ${D.off}25`, color:D.off }}>✕</button>
            </div>
          </div>

        <div style={{ display:"flex", gap:8, flexWrap:"wrap",
          paddingTop:4, borderTop:`1px solid ${D.b0}` }}>
          <ABtn emoji="📋" label="Clone Config" color={D.accentL} />
          <ABtn emoji="💾" label="Backup"        color={D.teal} />
          <ABtn emoji="📂" label="Restore"       color={D.gold} />
        </div>
      </Crd>

      <Sl>Debug</Sl>
      <Crd style={{ padding:"0 16px", marginBottom:18 }}>
        <SR icon="📝" title="Enable Logs" sub="Record device events" k="enableLogs" />
      </Crd>
      <div style={{ display:"flex", gap:8, marginBottom:22 }}>
        <ABtn emoji="📤" label="Export Logs"  color={D.teal} />
        <ABtn emoji="📊" label="Diagnostics" color={D.accentL} />
      </div>

      <Sl>Danger Zone</Sl>
      <Crd style={{ padding:"14px 16px", border:`1px solid ${D.off}28` }}>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          <button className="tap"
            style={{ width:"100%", padding:"11px", borderRadius:11,
              background:`${D.warn}10`, border:`1px solid ${D.warn}30`,
              color:D.warn, fontSize:13, fontWeight:700, fontFamily:D.fb,
              display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <RefreshCw size={14} />Restart Device
          </button>
          <button className="tap"
            style={{ width:"100%", padding:"11px", borderRadius:11,
              background:`${D.off}10`, border:`1px solid ${D.off}30`,
              color:D.off, fontSize:13, fontWeight:700, fontFamily:D.fb,
              display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <RotateCcw size={14} />Factory Reset
          </button>
          <button onClick={onBack} className="tap"
            style={{ width:"100%", padding:"11px", borderRadius:11,
              background:`${D.off}18`, border:`1px solid ${D.off}40`,
              color:D.off, fontSize:13, fontWeight:700, fontFamily:D.fb,
              display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
            <Trash2 size={14} />Delete Device
          </button>
        </div>
      </Crd>
    </div>
  )
}

const LM_TABS = [
  {id:"overview",l:"Overview"},{id:"timers",l:"Timers"},{id:"schedule",l:"Schedule"},

]

function LampManagementPage({ lamp, onUpdate, onBack }) {
  const [tab, setTab] = useState("overview")
  const cs = connS(lamp)

  const upd = useCallback(patch => onUpdate(lamp.id, patch), [lamp.id, onUpdate])

  function renderTab() {
    if (tab === "overview")     return <LMOverview    lamp={lamp} upd={upd} />
    if (tab === "timers")       return <LMTimers      lamp={lamp} upd={upd} />
    if (tab === "schedule")     return <LMSchedule    lamp={lamp} upd={upd} />
    if (tab === "users")        return <LMUsers       lamp={lamp} />
    if (tab === "automation")   return <LMAutomation  lamp={lamp} />
    if (tab === "scenes")       return <LMScenes      lamp={lamp} />
    if (tab === "history")      return <LMHistory     lamp={lamp} />
    if (tab === "description")  return <LMDescription lamp={lamp} upd={upd} />
    if (tab === "specs")        return <LMSpecs       lamp={lamp} />
    if (tab === "settings")     return <LMSettings    lamp={lamp} upd={upd} onBack={onBack} />
    return null
  }

  return (
    <div className="pg" style={{ display:"flex", flexDirection:"column",
      height:"100vh", paddingTop:62, paddingBottom:80,
      overflow:"hidden", background:D.bg }}>

      <div style={{ flexShrink:0, padding:"14px 18px 10px", borderBottom:`1px solid ${D.b0}` }}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:14, marginBottom:10 }}>
          <div style={{ width:58, height:58, borderRadius:18, flexShrink:0,
            background: lamp.on ? `radial-gradient(circle,${lamp.rgb}32,${D.elevated})` : D.elevated,
            border:`1px solid ${lamp.on ? lamp.rgb+"50" : D.b0}`,
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow: lamp.on ? `0 0 26px ${lamp.rgb}55` : "none" }}>
            <Lightbulb size={26} color={lamp.on ? lamp.rgb : D.mute}
              fill={lamp.on ? lamp.rgb+"55" : "none"} />
          </div>
          <div style={{ flex:1, minWidth:0 }}>
            <p style={{ fontSize:20, fontWeight:700, color:D.txt, fontFamily:D.fd,
              letterSpacing:"-.01em", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {lamp.name}
            </p>
            <p style={{ fontSize:12, color:D.mute, marginTop:1 }}>{lamp.room} · {lamp.floor}</p>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:6, alignItems:"center" }}>
              <MTag status={lamp.mqttStatus} />
              <CBadge status={cs} />
              <span style={{ fontSize:10, color:D.mute, fontFamily:D.fm,
                background:D.elevated, padding:"2px 7px", borderRadius:5 }}>
                FW {lamp.firmware}
              </span>
            </div>
          </div>
          <PToggle on={lamp.on} cs={cs}
            onChange={v => upd({on:v,lastCommand:v?"Turn ON":"Turn OFF",lastUpdate:Date.now()})} />
        </div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:9 }}>
          {[lamp.deviceId, lamp.mac, lamp.health.ip,
            lamp.online ? `✓ ${timeAgo(lamp.lastSeen)}` : "✗ Offline"
          ].map(t => <Chip key={t} tag={t} />)}
        </div>
        <div style={{ display:"flex", gap:7, overflowX:"auto", paddingBottom:2 }}>
          {[{e:"🔄",l:"Restart",c:D.warn},{e:"🔃",l:"Refresh",c:D.accentL},{e:"📍",l:"Locate",c:D.on}].map(a => (
            <button key={a.l} className="tap"
              style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 13px",
                borderRadius:10, background:`${a.c}10`, border:`1px solid ${a.c}25`,
                color:a.c, fontSize:12, fontWeight:700, fontFamily:D.fb, whiteSpace:"nowrap" }}>
              <span style={{ fontSize:13 }}>{a.e}</span>{a.l}
            </button>
          ))}
        </div>
      </div>

      <div style={{ flexShrink:0, borderBottom:`1px solid ${D.b0}`,
        background:`${D.bg}f8`, backdropFilter:"blur(18px)" }}>
        <div style={{ display:"flex", overflowX:"auto", padding:"0 6px" }}>
          {LM_TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ padding:"11px 14px", flexShrink:0,
                borderBottom:`2.5px solid ${tab===t.id ? D.accentL : "transparent"}`,
                color: tab===t.id ? D.accentL : D.mute,
                fontSize:12, fontWeight:700, fontFamily:D.fb,
                whiteSpace:"nowrap", background:"none",
                transition:"color .18s,border-color .18s" }}>
              {t.l}

          ))}

      </div>

      <div key={tab} style={{ flex:1, overflowY:"auto", padding:"18px 18px 30px" }} className="su">
        {renderTab()}
      </div>
    </div>
  )
}

function TimerSheet({ lamp, onClose, onSet }) {
  const [action, setAction] = useState("off")
  const [showCustom, setShowCustom] = useState(false)
  const [cH, setCH] = useState(0)
  const [cM, setCM] = useState(30)
  const presets = [
    {l:"15 Minutes",ms:900000},{l:"30 Minutes",ms:1800000},
    {l:"1 Hour",ms:3600000},{l:"2 Hours",ms:7200000},
  ]
  return (
    <div style={{ position:"fixed",inset:0,zIndex:200,
      background:"rgba(0,0,0,.72)",backdropFilter:"blur(5px)",
      display:"flex",alignItems:"flex-end",justifyContent:"center" }}
      onClick={onClose}>
      <div style={{ width:"100%",maxWidth:480,
        background:D.elevated,borderRadius:"22px 22px 0 0",
        border:`1px solid ${D.b0}`,borderBottom:"none",
        boxShadow:"0 -10px 60px rgba(0,0,0,.75)",overflow:"hidden" }}
        onClick={e => e.stopPropagation()}>
        <div style={{ display:"flex",justifyContent:"center",padding:"12px 0 6px" }}>
          <div style={{ width:38,height:4,borderRadius:99,background:D.b0 }} />
        </div>
        <div style={{ padding:"4px 20px 12px",borderBottom:`1px solid ${D.b0}` }}>
          <p style={{ fontSize:15,fontWeight:800,color:D.txt,fontFamily:D.fd }}>⏱ Set Timer</p>
          <p style={{ fontSize:11,color:D.mute,marginTop:2,fontFamily:D.fm }}>{lamp.name}</p>
        </div>
        <div style={{ padding:"14px 20px 0" }}>
          <p style={{ fontSize:9,color:D.mute,fontFamily:D.fm,letterSpacing:".12em",textTransform:"uppercase",marginBottom:8 }}>Action after timer</p>
          <div style={{ display:"flex",gap:8 }}>
            {[{v:"off",l:"Turn OFF",c:D.off,i:"🔴"},{v:"on",l:"Turn ON",c:D.on,i:"🟢"}].map(o => (
              <button key={o.v} className="tap" onClick={() => setAction(o.v)}
                style={{ flex:1,padding:"9px 12px",borderRadius:10,
                  background: action===o.v ? `${o.c}18` : `rgba(255,255,255,.04)`,
                  border:`1.5px solid ${action===o.v ? o.c+"55" : D.b0}`,
                  color: action===o.v ? o.c : D.mute,
                  fontSize:12,fontWeight:700,fontFamily:D.fb,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:6 }}>
                <span>{o.i}</span>{o.l}
              </button>
            ))}
          </div>
        </div>
        <div style={{ padding:"14px 20px 0" }}>
          <p style={{ fontSize:9,color:D.mute,fontFamily:D.fm,letterSpacing:".12em",textTransform:"uppercase",marginBottom:8 }}>Duration</p>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8 }}>
            {presets.map(p => (
              <button key={p.l} className="tap" onClick={() => onSet(p.ms,action)}
                style={{ padding:"11px 16px",borderRadius:10,
                  background:`${D.warn}0d`,border:`1px solid ${D.warn}28`,
                  color:"#fde68a",fontSize:13,fontWeight:700,fontFamily:D.fb,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:7 }}>
                ⏱ {p.l}
              </button>
            ))}
          </div>
        </div>
        <div style={{ padding:"12px 20px 0" }}>
          <button className="tap" onClick={() => setShowCustom(!showCustom)}
            style={{ width:"100%",padding:"10px",borderRadius:10,
              background:`rgba(96,165,250,.07)`,border:`1px solid rgba(96,165,250,.2)`,
              color:D.accentL,fontSize:12,fontWeight:700,fontFamily:D.fb,
              display:"flex",alignItems:"center",justifyContent:"center",gap:7 }}>
            🕐 Custom Time {showCustom ? "▲" : "▼"}
          </button>
          {showCustom && (
            <div style={{ marginTop:10,display:"flex",gap:10,alignItems:"flex-end" }}>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:9,color:D.mute,fontFamily:D.fm,marginBottom:4 }}>Hours</p>
                <input type="number" min={0} max={23} value={cH}
                  onChange={e => setCH(Math.max(0,Math.min(23,+e.target.value)))}
                  style={{ width:"100%",padding:"9px",borderRadius:9,
                    background:D.bg,border:`1px solid ${D.b0}`,color:D.txt,
                    fontSize:18,fontWeight:700,textAlign:"center",fontFamily:D.fd }} />
              </div>
              <span style={{ color:D.mute,fontSize:22,paddingBottom:8 }}>:</span>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:9,color:D.mute,fontFamily:D.fm,marginBottom:4 }}>Minutes</p>
                <input type="number" min={0} max={59} value={cM}
                  onChange={e => setCM(Math.max(0,Math.min(59,+e.target.value)))}
                  style={{ width:"100%",padding:"9px",borderRadius:9,
                    background:D.bg,border:`1px solid ${D.b0}`,color:D.txt,
                    fontSize:18,fontWeight:700,textAlign:"center",fontFamily:D.fd }} />
              </div>
              <button className="tap" disabled={cH===0&&cM===0}
                onClick={() => { const ms=(cH*60+cM)*60000; if(ms>0) onSet(ms,action) }}
                style={{ padding:"10px 14px",borderRadius:9,
                  background:(cH>0||cM>0)?D.on:D.mute,border:"none",color:"#fff",
                  fontSize:12,fontWeight:800,fontFamily:D.fb,opacity:(cH===0&&cM===0)?.45:1 }}>
                SET
              </button>
            </div>
          )}
        </div>
        <div style={{ padding:"12px 20px 22px" }}>
          <button className="tap" onClick={onClose}
            style={{ width:"100%",padding:"12px",borderRadius:10,
              background:`rgba(255,255,255,.05)`,border:`1px solid ${D.b0}`,
              color:D.mute,fontSize:13,fontWeight:700,fontFamily:D.fb }}>
            Cancel
          </button>
        </div>
      </div>
    </div>
  )
}

// ─── COMPACT LAMP CARD ───────────────────────────────────────────
function LampCard({ lamp, onUpdate, onAdvanced }) {
  const [brt, setBrt]       = useState(lamp.brightness)
  const [cd,  setCd]        = useState(lamp.activeTimer ? fmtCD(lamp.activeTimer.expiresAt) : "")
  const [timerOpen, setTimerOpen] = useState(false)

  useEffect(() => {
    if (!lamp.activeTimer) { setCd(""); return }
    setCd(fmtCD(lamp.activeTimer.expiresAt))
    const t = setInterval(() => setCd(fmtCD(lamp.activeTimer.expiresAt)), 1000)
    return () => clearInterval(t)
  }, [lamp.activeTimer])

  const cs  = connS(lamp)
  const upd = useCallback(patch => onUpdate(lamp.id, patch), [lamp.id, onUpdate])

  const handleTimerSet = useCallback((ms, action) => {
    upd({
      activeTimer:{action, expiresAt:Date.now()+ms, label:`${Math.round(ms/60000)}m→${action.toUpperCase()}`},
      lastCommand:`Timer ${Math.round(ms/60000)}m`, lastUpdate:Date.now()
    })
    setTimerOpen(false)
  }, [upd])

  const borderColor = lamp.online ? (lamp.on ? lamp.rgb+"38" : D.b0) : D.off+"22"

  const trackStyle = {
    background: lamp.on
      ? `linear-gradient(90deg, ${lamp.rgb} ${brt}%, rgba(255,255,255,0.08) ${brt}%)`
      : `linear-gradient(90deg, ${D.mute}60 ${brt}%, rgba(255,255,255,0.06) ${brt}%)`,
  }

  return (
    <div style={{
      marginBottom: 12,
      borderRadius: 18,
      background: `linear-gradient(145deg, ${D.elevated} 0%, ${D.surface} 100%)`,
      border: `1px solid ${borderColor}`,
      boxShadow: lamp.on
        ? `0 4px 24px ${lamp.rgb}12, 0 1px 6px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04)`
        : `0 2px 12px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.03)`,
      overflow: "hidden", position: "relative", transition: "box-shadow .35s, border-color .35s",
    }}>

      <div style={{
        height: 2, borderRadius: "18px 18px 0 0",
        background: lamp.on
          ? `linear-gradient(90deg, transparent 0%, ${lamp.rgb}90 40%, ${lamp.rgb}90 60%, transparent 100%)`
          : `linear-gradient(90deg, transparent 0%, ${D.mute}40 50%, transparent 100%)`,
        transition: "background .4s",
      }} />

      {!lamp.online && (
        <div style={{
          position: "absolute", inset: 0, zIndex: 6,
          background: "rgba(6,9,18,0.62)", borderRadius: 18,
          display: "flex", alignItems: "center", justifyContent: "center",
          backdropFilter: "blur(1.5px)", pointerEvents: "none",
        }}>
          <div style={{ textAlign:"center" }}>
            <span style={{ fontSize:20, display:"block", marginBottom:4 }}>📡</span>
            <p style={{ fontSize:10, color:D.sec, letterSpacing:".08em", fontFamily:D.fb, fontWeight:700, textTransform:"uppercase" }}>Offline</p>
          </div>
        </div>
      )}

      <div style={{ padding: "12px 14px 10px" }}>

        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>

          <div style={{
            width: 40, height: 40, borderRadius: 12, flexShrink: 0,
            background: lamp.on
              ? `radial-gradient(circle at 35% 35%, ${lamp.rgb}55, ${lamp.rgb}22)`
              : `radial-gradient(circle at 35% 35%, rgba(239,68,68,.22), rgba(239,68,68,.08))`,
            border: `1.5px solid ${lamp.on ? lamp.rgb+"55" : D.off+"35"}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 18, flexShrink: 0,
            boxShadow: lamp.on ? `0 0 16px ${lamp.rgb}40` : `0 0 10px ${D.off}28`,
            transition: "all .4s",
            animation: lamp.on ? "glowP 2.8s ease-in-out infinite" : "none",
          }}>💡</div>

          <div style={{ flex:1, minWidth:0 }}>
            <p style={{
              fontSize: 14, fontWeight: 700, color: D.txt, fontFamily: D.fd,
              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
              letterSpacing:"-.01em", lineHeight: 1.2,
            }}>{lamp.name}</p>
            <p style={{ fontSize: 10, color: D.sec, marginTop:1, fontFamily:D.fb }}>
              {lamp.room} · {lamp.floor}

          </div>

          <div style={{ display:"flex", alignItems:"center", gap:7, flexShrink:0 }}>
            <div style={{

              borderRadius:99, fontSize:9, fontWeight:800, letterSpacing:".12em",

            fontSize:9, color:D.mute, fontFamily:D.fm,

              color: lamp.schedules.length ? "#93c5fd" : D.sec,
              fontSize:11, fontWeight:700, fontFamily:D.fb,
            }}
            onClick={() => onAdvanced(lamp)}>
            <span style={{ fontSize:13 }}>📅</span>
            <span>Schedule</span>
          </button>

          <button className="tap"
            onClick={e => { e.stopPropagation(); onAdvanced(lamp) }}
            style={{
              padding:"7px 4px", borderRadius:10,
              display:"flex", alignItems:"center", justifyContent:"center", gap:5,
              background:"rgba(96,165,250,0.07)",
              border:"1px solid rgba(96,165,250,0.22)", color:D.accentL,
              fontSize:11, fontWeight:700, fontFamily:D.fb,
            }}>
            <Settings size={13} color={D.accentL} />
            <span>Advanced</span>
          </button>
        </div>
      </div>

      <div style={{
        padding:"7px 14px 9px", marginTop:2,
        borderTop:`1px solid ${D.b0}`,

        <span style={{ fontSize:10, color:D.mute, fontFamily:D.fm }}>
          Updated {timeAgo(lamp.lastUpdate)}
        </span>
        {lamp.lastCommand && (
          <span style={{ fontSize:10, color:D.mute, fontFamily:D.fm }}>
            Last: <strong style={{ color:D.sec, fontWeight:600 }}>{lamp.lastCommand}</strong>
          </span>
        )}
      </div>

      {timerOpen && (
        <TimerSheet lamp={lamp} onClose={() => setTimerOpen(false)} onSet={handleTimerSet} />
      )}
    </div>
  )
}

function LampsPage({ lamps, setLamps, onAdvanced }) {
  const [q,    setQ]    = useState("")
  const [filt, setFilt] = useState("all")
  const [room, setRoom] = useState(null)
  const rooms = [...new Set(lamps.map(l => l.room))]

  const shown = lamps.filter(l => {
    const mQ = !q || l.name.toLowerCase().includes(q.toLowerCase()) || l.room.toLowerCase().includes(q.toLowerCase())
    const mF = filt==="all" || (filt==="on"&&l.on) || (filt==="off"&&!l.on&&l.online) || (filt==="offline"&&!l.online)
    const mR = !room || l.room === room
    return mQ && mF && mR
  })

  const update = useCallback((id, patch) => setLamps(prev => prev.map(l => l.id===id ? {...l,...patch} : l)), [setLamps])

  return (
    <div className="pg" style={{ padding:"78px 18px 96px", overflowY:"auto" }}>
      <div style={{ display:"flex", alignItems:"center", gap:10, background:D.surface,
        borderRadius:14, padding:"10px 14px", border:`1px solid ${D.b0}`, marginBottom:12 }}>
        <Search size={15} color={D.mute} />
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search lamps or rooms…"
          style={{ flex:1, background:"none", border:"none", color:D.txt, fontSize:14, outline:"none" }} />
        {q && (
          <button onClick={() => setQ("")} style={{ background:"none", color:D.mute, padding:0, display:"flex" }}>
            <X size={14} />
          </button>
        )}
      </div>

      <div style={{ display:"flex", gap:8, marginBottom:10, overflowX:"auto", paddingBottom:2 }}>
        {[{id:"all",l:"All"},{id:"on",l:"On"},{id:"off",l:"Off"},{id:"offline",l:"Offline"}].map(f => (
          <button key={f.id} onClick={() => setFilt(f.id)} className="tap"
            style={{ padding:"5px 14px", borderRadius:99, whiteSpace:"nowrap",
              background: filt===f.id ? D.accent : "transparent",
              border:`1px solid ${filt===f.id ? D.accent : D.b0}`,
              color: filt===f.id ? "#fff" : D.mute,
              fontSize:12, fontWeight:700, fontFamily:D.fb }}>
            {f.l}
          </button>
        ))}
      </div>

      <div style={{ display:"flex", gap:7, marginBottom:16, overflowX:"auto", paddingBottom:2 }}>
        {rooms.map(r => (
          <button key={r} onClick={() => setRoom(room===r ? null : r)} className="tap"
            style={{ padding:"4px 12px", borderRadius:99, whiteSpace:"nowrap",
              background: room===r ? `${D.gold}18` : "transparent",
              border:`1px solid ${room===r ? D.gold : D.b0}`,
              color: room===r ? D.gold : D.mute,
              fontSize:11, fontWeight:700, fontFamily:D.fb }}>
            {r}
          </button>
        ))}
      </div>

      <p style={{ fontSize:11, color:D.mute, marginBottom:12 }}>
        {shown.length} lamp{shown.length !== 1 ? "s" : ""} shown
      </p>
      {shown.map(lamp => (
        <LampCard key={lamp.id} lamp={lamp} onUpdate={update} onAdvanced={onAdvanced} />
      ))}
    </div>
  )
}

function HealthPage({ lamps }) {
  const healthy  = lamps.filter(l => l.health.signalQuality >= 80).length
  const warning  = lamps.filter(l => l.health.signalQuality >= 55 && l.health.signalQuality < 80).length
  const critical = lamps.filter(l => l.health.signalQuality < 55 || !l.online).length

  function MBar({ label, val, max, color, unit }) {
    const u = unit || ""
    return (
      <div style={{ marginBottom:9 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
          <span style={{ fontSize:11, color:D.sec, fontWeight:600 }}>{label}</span>
          <span style={{ fontSize:11, color, fontFamily:D.fm }}>{val}{u}</span>
        </div>
        <PBar value={val} max={max || 100} color={color} />

  return (
    <div className="pg" style={{ padding:"78px 18px 96px", overflowY:"auto" }}>
      <div style={{ display:"flex", gap:10, marginBottom:22 }}>
        <StatCard label="Healthy"  value={healthy}  sub="devices" color={D.on}   Icon={CheckCircle2} />
        <StatCard label="Warning"  value={warning}  sub="devices" color={D.warn} Icon={AlertTriangle} />
        <StatCard label="Critical" value={critical} sub="devices" color={D.off}  Icon={X} />

      <Sl>Device Health</Sl>
      {lamps.map(l => {
        const q   = l.health.signalQuality
        const qc  = hColor(q)
        const lbl = q >= 80 ? "HEALTHY" : q >= 55 ? "WARNING" : "CRITICAL"
        return (
          <Crd key={l.id} style={{ padding:"16px", marginBottom:12, border:`1px solid ${qc}20` }}>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>

                background:`${qc}14`, border:`1px solid ${qc}30`,

                <Lightbulb size={20} color={qc} />
              </div>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:15, fontWeight:700, color:D.txt, fontFamily:D.fb }}>{l.name}</p>
                <p style={{ fontSize:11, color:D.mute, fontFamily:D.fm }}>{l.health.ip} · {l.firmware}</p>
              </div>
              <span style={{ fontSize:9, fontWeight:700, color:qc, fontFamily:D.fm,
                background:`${qc}14`, padding:"3px 9px", borderRadius:6,
                border:`1px solid ${qc}30` }}>{lbl}</span>
            </div>
            <MBar label="Signal Quality" val={q}              max={100} color={qc}                                              unit="%" />
            <MBar label="CPU Usage"      val={l.health.cpu}   max={100} color={l.health.cpu>70?D.off:l.health.cpu>40?D.warn:D.on}   unit="%" />
            <MBar label="Memory Usage"   val={l.health.memory} max={100} color={l.health.memory>80?D.off:l.health.memory>60?D.warn:D.accentL} unit="%" />

function UsersPage() {
  const [users,  setUsers]  = useState(USERS0)
  const [adding, setAdding] = useState(false)

  function toggle(id) { setUsers(prev => prev.map(u => u.id===id ? {...u,status:u.status==="active"?"inactive":"active"} : u)) }

    if (!form.name || !form.email) return
    const init  = form.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()
    const color = {Admin:D.accent,Manager:D.on,Operator:D.purple,Viewer:D.gold}[form.role]||D.mute
    setUsers(prev => [...prev,{id:Date.now(),init,color,status:"active",lastLogin:"just now",...form}])

  return (

      <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:14 }}>

      {shown.map(a => (
        <div key={a.id} style={{ display:"flex", gap:12, alignItems:"flex-start",
          padding:"12px 0", borderBottom:`1px solid ${D.b0}` }}>

            background:`${TC[a.type]||D.mute}12`, border:`1px solid ${TC[a.type]||D.mute}20`,
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>

function RoomsPage({ lamps }) {

            <Crd key={room.id} style={{ padding:"16px" }}>

                <span style={{ fontSize:22 }}>{room.emoji}</span>

                </div>

              {[
                {l:"Active", v:`${ron}/${rl.length}`,   c:ron>0?D.on:D.mute},

function AccessPage() {
  const [tab,      setTab]     = useState("requests")
  const [pending,  setPending] = useState(PENDING0)
  const [approved, setApproved] = useState([])

  function approve(id) {
    const r = pending.find(p => p.id===id)
    if (r) setApproved(a => [...a,{...r}])
    setPending(p => p.filter(x => x.id!==id))
  }

  return (
    <div className="pg" style={{ padding:"78px 18px 96px", overflowY:"auto" }}>
      <div style={{ display:"flex", background:D.surface, borderRadius:12, padding:4,
        marginBottom:20, border:`1px solid ${D.b0}` }}>
        {[{id:"requests",l:"Requests"},{id:"permissions",l:"Permissions"},{id:"history",l:"History"}].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ flex:1, padding:"7px", borderRadius:9,
              background: tab===t.id ? D.elevated : "transparent",
              color: tab===t.id ? D.txt : D.mute,
              fontSize:12, fontWeight:700, fontFamily:D.fb,
              border:`1px solid ${tab===t.id ? D.b0 : "transparent"}`,
              position:"relative" }}>
            {t.l}
            {t.id==="requests" && pending.length > 0 && (
              <span style={{ position:"absolute", top:4, right:4, width:15, height:15,
                borderRadius:"50%", background:D.off, color:"#fff",
                fontSize:8, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>
                {pending.length}
              </span>
            )}
          </button>
        ))}
      </div>

      {tab==="requests" && (
        <>
          {pending.length===0 && (
            <div style={{ textAlign:"center", padding:"44px 20px" }}>
              <CheckCircle2 size={38} color={D.on} style={{ margin:"0 auto 12px" }} />
              <p style={{ fontSize:14, fontWeight:700, color:D.sec, fontFamily:D.fb }}>No pending requests</p>
            </div>
          )}
          {pending.map(r => (
            <Crd key={r.id} style={{ padding:"16px", marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
                <Av init={r.init} color={r.color} sz={44} />
                <div style={{ flex:1 }}>
                  <p style={{ fontSize:14, fontWeight:700, color:D.txt, fontFamily:D.fb }}>{r.user}</p>
                  <p style={{ fontSize:12, color:D.mute }}>Requests: {r.req}</p>
                </div>
              </div>
              <div style={{ display:"flex", gap:10 }}>
                <button onClick={() => approve(r.id)} className="tap"
                  style={{ flex:1, padding:"10px", borderRadius:10, background:`${D.on}12`,
                    border:`1px solid ${D.on}30`, color:D.on, fontSize:13, fontWeight:700, fontFamily:D.fb }}>
                  ✓ Approve
                </button>
                <button onClick={() => setPending(p => p.filter(x => x.id!==r.id))} className="tap"
                  style={{ flex:1, padding:"10px", borderRadius:10, background:`${D.off}12`,
                    border:`1px solid ${D.off}30`, color:D.off, fontSize:13, fontWeight:700, fontFamily:D.fb }}>
                  ✕ Reject
                </button>
              </div>
            </Crd>
          ))}
        </>
      )}

      {tab==="permissions" && (
        <>
          <Sl>Device Access Control</Sl>
          {DEV_PERMS.map(p => (
            <Crd key={p.lampId} style={{ padding:"16px", marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                <Lightbulb size={17} color={D.gold} />
                <p style={{ fontSize:14, fontWeight:700, color:D.txt, fontFamily:D.fb, flex:1 }}>{p.lamp}</p>
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:7 }}>
                {p.allowed.map(r => (
                  <span key={r} style={{ fontSize:11, color:D.on, background:`${D.on}12`,
                    padding:"2px 8px", borderRadius:5, fontWeight:600 }}>✓ {r}</span>
                ))}
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {p.denied.map(d => (
                  <span key={d} style={{ fontSize:11, color:D.off, background:`${D.off}12`,
                    padding:"2px 8px", borderRadius:5 }}>✕ {d}</span>
                ))}
              </div>
            </Crd>
          ))}
        </>
      )}

      {tab==="history" && (
        <>
          <Sl>Approval History</Sl>
          {approved.length===0 && (
            <p style={{ color:D.mute, textAlign:"center", padding:"30px 0", fontFamily:D.fb }}>No history yet</p>
          )}
          {approved.map((r,i) => (
            <div key={i} style={{ display:"flex", gap:12, alignItems:"center",
              padding:"12px 0", borderBottom:`1px solid ${D.b0}` }}>
              <Av init={r.init} color={r.color} sz={36} />
              <div style={{ flex:1 }}>
                <p style={{ fontSize:13, color:D.txt, fontFamily:D.fb, fontWeight:600 }}>{r.user}</p>
                <p style={{ fontSize:11, color:D.mute }}>{r.req}</p>
              </div>
              <span style={{ fontSize:11, color:D.on, fontWeight:700 }}>Approved</span>
            </div>
          ))}
        </>
      )}
    </div>
  )
}

// ─── NAVIGATION ───────────────────────────────────────────────────
const NAV = [
  {id:"home",   label:"Home",  emoji:"🏠"},
  {id:"lamps",  label:"Lamps", emoji:"💡"},
  {id:"energy", label:"Energy",emoji:"⚡"},
  {id:"users",  label:"Users", emoji:"👥"},
  {id:"more",   label:"More",  emoji:"◉"},
]
const SECONDARY = ["mqtt","health","scenes","rooms","notifs","activity","access","roles","settings"]
const TITLES = {
  home:"LUMA",lamps:"Lamps",energy:"Energy",mqtt:"MQTT",health:"Health",
  scenes:"Scenes",users:"Users",access:"Access",notifs:"Notifications",
  activity:"Activity",rooms:"Rooms",roles:"Roles",settings:"Settings",more:"More",
}

// ─── APP ROOT ─────────────────────────────────────────────────────
function App() {
  const [page,        setPage]        = useState("home")
  const [lamps,       setLamps]       = useState(LAMPS0)
  const [activeLampId,setActiveLampId] = useState(null)

  const unreadCount  = NOTIFS0.filter(n => !n.read).length
  const isSecondary  = SECONDARY.includes(page)
  const isLampMgmt   = page === "lamp-mgmt"
  const activeLamp   = lamps.find(l => l.id === activeLampId)

  const gotoLamp  = useCallback(lamp => { setActiveLampId(lamp.id); setPage("lamp-mgmt") }, [])
  const updateLamp = useCallback((id, patch) => setLamps(prev => prev.map(l => l.id===id ? {...l,...patch} : l)), [])

  function handleBack() {
    if (isLampMgmt)  { setPage("lamps"); return }
    if (isSecondary) { setPage("more");  return }
    setPage("home")
  }

  function navActive(id) {
    if (page === id) return true
    if (id === "more"  && isSecondary) return true
    if (id === "lamps" && isLampMgmt)  return true
    return false
  }

  function getTitle() {
    if (isLampMgmt) return activeLamp?.name || "Device"
    return TITLES[page] || "LUMA"
  }

  function renderPage() {
    if (page === "home")     return <Dashboard lamps={lamps} goto={setPage} />
    if (page === "lamps")    return <LampsPage lamps={lamps} setLamps={setLamps} onAdvanced={gotoLamp} />
    if (page === "energy")   return <EnergyPage lamps={lamps} />
    if (page === "mqtt")     return <MQTTPage lamps={lamps} />
    if (page === "health")   return <HealthPage lamps={lamps} />
    if (page === "scenes")   return <ScenesPage lamps={lamps} setLamps={setLamps} />
    if (page === "users")    return <UsersPage />
    if (page === "access")   return <AccessPage />
    if (page === "notifs")   return <NotificationsPage />
    if (page === "activity") return <ActivityPage />
    if (page === "rooms")    return <RoomsPage lamps={lamps} />
    if (page === "roles")    return <RolesPage />
    if (page === "settings") return <SettingsPage />
    if (page === "more")     return <MorePage goto={setPage} />
    if (isLampMgmt && activeLamp) {
      return <LampManagementPage lamp={activeLamp} onUpdate={updateLamp} onBack={() => setPage("lamps")} />
    }
    return null
  }

  return (
    <div style={{ background:D.bgLow, minHeight:"100vh", display:"flex", justifyContent:"center" }}>
      <div style={{ width:"100%", maxWidth:430, minHeight:"100vh",
        background:D.bg, position:"relative", fontFamily:D.fb, overflowX:"hidden" }}>

        <header style={{ position:"fixed", top:0, left:"50%", transform:"translateX(-50%)",
          width:"100%", maxWidth:430, zIndex:50,
          background:`${D.bg}ee`, backdropFilter:"blur(22px)",
          borderBottom:`1px solid ${D.b0}`,
          padding:"13px 18px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <button onClick={handleBack}
            style={{ width:36, height:36, borderRadius:10, background:D.elevated,
              border:`1px solid ${D.b0}`, color:D.sec,
              display:"flex", alignItems:"center", justifyContent:"center",
              opacity: (isSecondary || isLampMgmt) ? 1 : 0,
              pointerEvents: (isSecondary || isLampMgmt) ? "auto" : "none",
              transition:"opacity .18s" }}>
            <ChevronLeft size={18} />
          </button>

          <div style={{ textAlign:"center", maxWidth:220 }}>
            <p style={{ fontSize:19, fontWeight:700, color:D.txt, fontFamily:D.fd,
              letterSpacing:".04em", lineHeight:1,
              overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {getTitle()}
            </p>
            {page === "home" && (
              <p style={{ fontSize:9, color:D.gold, letterSpacing:".22em",
                textTransform:"uppercase", fontFamily:D.fb, marginTop:2 }}>Smart Home</p>
            )}
            {isLampMgmt && activeLamp && (
              <p style={{ fontSize:10, color:D.mute, marginTop:1 }}>
                {activeLamp.room} · {activeLamp.floor}
              </p>
            )}
          </div>

          <button onClick={() => setPage("notifs")}
            style={{ width:36, height:36, borderRadius:10, background:D.elevated,
              border:`1px solid ${D.b0}`, color:D.sec,
              display:"flex", alignItems:"center", justifyContent:"center", position:"relative" }}>
            <Bell size={16} />
            {unreadCount > 0 && (
              <span style={{ position:"absolute", top:7, right:7, width:8, height:8,
                borderRadius:"50%", background:D.off, border:`1.5px solid ${D.bg}` }} />
            )}
          </button>
        </header>

        <div key={page + activeLampId}>
          {renderPage()}
        </div>

        <nav style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
          width:"100%", maxWidth:430, zIndex:100,
          background:`${D.bgLow}f5`, backdropFilter:"blur(24px)",
          borderTop:`1px solid ${D.b0}`,
          display:"flex", justifyContent:"space-around", padding:"8px 0 20px" }}>
          {NAV.map(n => {
            const a = navActive(n.id)
            return (
              <button key={n.id}
                onClick={() => {
                  if (n.id === "lamps" && isLampMgmt) { setPage("lamps"); return }
                  setPage(n.id)
                }}
                style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                  background:"none", border:"none", cursor:"pointer",
                  padding:"5px 14px", borderRadius:12, transition:"all .18s" }}>
                <span style={{ fontSize: a ? 22 : 20, transition:"font-size .18s" }}>{n.emoji}</span>
                <span style={{ fontSize:9, fontWeight:700, letterSpacing:".08em", fontFamily:D.fb,
                  textTransform:"uppercase", color: a ? D.accentL : D.mute, transition:"color .18s" }}>
                  {n.label}
                </span>
                {a && <div style={{ width:18, height:2, borderRadius:99, background:D.accentL }} />}
              </button>
            )
          })}
        </nav>
      </div>
    </div>
  )
}

const root = ReactDOM.createRoot(document.getElementById("root"))
root.render(<App />)
</script>
